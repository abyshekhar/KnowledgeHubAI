name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Run tests
        run: pytest --cov=backend/app --cov-report=term-missing
        env:
          PYTHONPATH: .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pip-audit
      # transformers (transitive via sentence-transformers) has no version that
      # clears these: PYSEC-2025-217/PYSEC-2026-2290 have no released fix, and all
      # four concern X-CLIP checkpoint deserialization, which this project never
      # loads (we only use SentenceTransformer/CrossEncoder for embeddings+reranking).
      - run: >
          pip-audit -r requirements.txt
          --ignore-vuln PYSEC-2025-217
          --ignore-vuln PYSEC-2026-2290
          --ignore-vuln PYSEC-2026-2288
          --ignore-vuln PYSEC-2026-2289
